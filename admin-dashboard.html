<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEMIX PRO | Master Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --primary: #8B0000; 
            --accent: #FF3E3E; 
            --bg: #0f172a; 
            --card-bg: rgba(255, 255, 255, 0.05); 
            --glass: rgba(255, 255, 255, 0.1); 
            --text: #f8fafc; 
            --success: #10b981; 
            --warning: #f59e0b; 
        }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* Layout & UI Components */
        .top-bar { backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.8); padding: 15px 30px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: 1px; }
        
        .container { padding: 25px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 400px; gap: 25px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 25px; border-radius: 24px; border: 1px solid var(--glass); margin-bottom: 25px; position: relative; overflow: hidden; }
        .req-card { background: rgba(0,0,0,0.3); padding: 18px; border-radius: 18px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        
        /* Forms */
        label { display: block; font-size: 11px; font-weight: 700; opacity: 0.6; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass); border-radius: 12px; color: white; font-size: 14px; }
        input:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.5); }
        
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 62, 62, 0.3); }

        /* Progress Bar */
        .progress-container { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 10px 0; }
        #capacityBar { height: 100%; width: 0%; border-radius: 10px; transition: width 1.5s ease; }

        /* Floating Action Button */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 999; }
        .fab-main { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 62, 62, 0.4); }
        .fab-options { position: absolute; bottom: 80px; right: 0; display: none; flex-direction: column; gap: 12px; }
        .fab-container.active .fab-options { display: flex; }
        .fab-item { background: white; color: black; padding: 12px 25px; border-radius: 30px; font-size: 13px; font-weight: 800; white-space: nowrap; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 30px; width: 100%; max-width: 550px; border: 1px solid var(--glass); position: relative; max-height: 90vh; overflow-y: auto; }
        
        .tab-btn { padding: 10px; background: none; border: none; border-bottom: 2px solid transparent; flex: 1; color: var(--text); cursor: pointer; opacity: 0.5; }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 700; opacity: 1; }
        
        .dynamic-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .pipeline-actions { display: flex; gap: 8px; }
        .btn-small { padding: 8px 12px; font-size: 12px; border-radius: 8px; }
        .btn-pdf { background: var(--success); }
        .btn-reject { background: #475569; }

        #analyticsChart { max-height: 250px; width: 100% !important; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">ACADEMIX <span style="color:var(--accent)">PRO</span></div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="adminDisplay" style="font-size:13px; font-weight:600; opacity:0.8;">...</div>
        <button onclick="Open_Nova()" style="background:var(--glass); font-size:12px;">Bill Nova Server</button>
        <button onclick="logout()" style="background:rgba(239, 68, 68, 0.2); color:#f87171; font-size:12px;">Logout</button>
    </div>
</div>

<div class="container">
    <div class="grid">
        <div class="main-panel">
            
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <div>
                        <label>Database Status</label>
                        <h3 id="capacityStatus" style="margin:0;">Syncing...</h3>
                    </div>
                    <div id="capacityText" style="font-weight:800; color:var(--accent);">0 / 1000</div>
                </div>
                <div class="progress-container">
                    <div id="capacityBar"></div>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="margin:0;">Admission Analytics</h2>
                    <span style="font-size:11px; opacity:0.6;">YEAR-OVER-YEAR GROWTH</span>
                </div>
                <canvas id="analyticsChart"></canvas>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="margin:0;">Admission Pipeline</h2>
                    <span id="countLabel" style="background:var(--success); padding:4px 12px; border-radius:20px; font-size:11px; font-weight:800;">0 NEW</span>
                </div>
                <div id="requestList"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div style="display:flex; margin-bottom:20px; border-bottom:1px solid var(--glass);">
                    <button class="tab-btn active" id="detailsTab" onclick="switchTab('details')">Profile Search</button>
                    <button class="tab-btn" id="resultsTab" onclick="switchTab('results')">Exam Results</button>
                </div>
                <label>Enrollment ID</label>
                <input id="finderInput" placeholder="e.g. 0001">
                <button id="finderBtn" style="width:100%" onclick="mainSearch()">🔍 Run Deep Search</button>
                <div id="finderResult" style="margin-top:20px;"></div>
            </div>

            <div class="card" style="background:linear-gradient(135deg, rgba(139,0,0,0.2), rgba(0,0,0,0.1));">
                <h4 style="margin-top:0;">System Log</h4>
                <p id="systemLog" style="font-size:11px; opacity:0.7; line-height:1.6;">Welcome back. System is ready for direct entry and PDF generation.</p>
            </div>
        </div>
    </div>
</div>

<div class="fab-container" id="fabMenu">
    <div class="fab-options">
        <div class="fab-item" onclick="openAdminManager()">🔑 Manage Admins</div>
        <div class="fab-item" onclick="openStudentModal()">👤 Direct Student Entry</div>
        <div class="fab-item" onclick="openResultModal()">📊 Enter Exam Result</div>
    </div>
    <div class="fab-main" onclick="toggleFab()">+</div>
</div>

<div class="modal" id="systemModal">
    <div class="modal-content">
        <span style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:24px; opacity:0.5;" onclick="closeModal()">×</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyClB9tZ1ClSyTa27rqDy-TtXSXFKOygy4k",
        authDomain: "academix-d221e.firebaseapp.com",
        projectId: "academix-d221e",
        storageBucket: "academix-d221e.firebasestorage.app",
        messagingSenderId: "285941718942",
        appId: "1:285941718942:web:57b3bbd7773c02a511808f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const STUDENT_LIMIT = 1000;
    let analyticsChart = null;

    // --- AUTHENTICATION CHECK ---
    const activeId = localStorage.getItem("activeAdminId");
    const activeName = localStorage.getItem("activeAdminName");
    if(!activeId) window.location.href = "login.html";
    document.getElementById("adminDisplay").innerText = "Logged in as: " + activeName;

    function toggleFab() { document.getElementById('fabMenu').classList.toggle('active'); }
    function closeModal() { document.getElementById('systemModal').classList.remove('active'); }

    // --- ANALYTICS & CAPACITY LOGIC ---
    async function updateCapacityAndGraph() {
        const snap = await db.collection("students").get();
        const count = snap.size;
        const percent = (count / STUDENT_LIMIT) * 100;
        
        const bar = document.getElementById('capacityBar');
        const status = document.getElementById('capacityStatus');
        
        document.getElementById('capacityText').innerText = `${count} / ${STUDENT_LIMIT}`;
        bar.style.width = percent + "%";

        if(percent < 75) {
            bar.style.background = "var(--success)";
            status.innerText = "Optimal Operations";
            status.style.color = "var(--success)";
        } else if(percent < 95) {
            bar.style.background = "var(--warning)";
            status.innerText = "Approaching Limit";
            status.style.color = "var(--warning)";
        } else {
            bar.style.background = "var(--accent)";
            status.innerText = "Critical Capacity";
            status.style.color = "var(--accent)";
        }
        
        renderAnalytics(snap);
    }

    function renderAnalytics(studentSnap) {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const currentYear = new Date().getFullYear();
        const lastYear = currentYear - 1;

        let currentData = new Array(12).fill(0);
        let lastData = new Array(12).fill(0);

        studentSnap.forEach(doc => {
            const data = doc.data();
            if(data.timestamp) {
                const date = new Date(data.timestamp);
                const m = date.getMonth();
                const y = date.getFullYear();
                if(y === currentYear) currentData[m]++;
                if(y === lastYear) lastData[m]++;
            }
        });

        const ctx = document.getElementById('analyticsChart').getContext('2d');
        if(analyticsChart) analyticsChart.destroy();

        analyticsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: months,
                datasets: [
                    {
                        label: `Admissions ${currentYear}`,
                        data: currentData,
                        borderColor: '#FF3E3E',
                        backgroundColor: 'rgba(255, 62, 62, 0.1)',
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: `Admissions ${lastYear}`,
                        data: lastData,
                        borderColor: '#475569',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#fff', font: { family: 'Plus Jakarta Sans' } } } },
                scales: {
                    y: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { display: false } }
                }
            }
        });
    }

    // --- STUDENT ENTRY LOGIC (ADVANCED FORM) ---
    async function openStudentModal(prefillData = null, reqDocId = null) {
        if(!prefillData) toggleFab();
        
        document.getElementById('modalBody').innerHTML = `<p style="text-align:center">Fetching Latest ID...</p>`;
        document.getElementById('systemModal').classList.add('active');

        const snap = await db.collection("students").get();
        let max = 0; snap.forEach(s => { if(parseInt(s.id) > max) max = parseInt(s.id); });
        const nextID = (max + 1).toString().padStart(4, '0');

        let classValue = prefillData?.class?.replace(/\D/g,'') || "1";

        let extraFieldsHtml = '';
        if(prefillData) {
            const standard = ['name', 'father', 'class', 'mobile'];
            Object.entries(prefillData).forEach(([key, value]) => {
                if(!standard.includes(key) && value && typeof value !== 'object') {
                    extraFieldsHtml += `<div class="dynamic-row"><input value="${key}" class="ext-key"><input value="${value}" class="ext-val"></div>`;
                }
            });
        }

        document.getElementById('modalBody').innerHTML = `
            <h2 style="margin-top:0; color:var(--accent)">${prefillData ? 'Verify & Admit' : 'Direct Student Entry'}</h2>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div><label>Enrollment ID</label><input id="s_id" value="${nextID}" readonly style="opacity:0.6"></div>
                <div><label>Entry Date</label><input type="date" id="s_date" value="${new Date().toISOString().split('T')[0]}"></div>
            </div>

            <label>Student Full Name</label>
            <input id="s_name" value="${prefillData?.name || ''}" placeholder="John Doe">

            <label>Guardian / Father's Name</label>
            <input id="s_father" value="${prefillData?.father || ''}" placeholder="Father Name">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div>
                    <label>Class</label>
                    <select id="s_class">
                        <option value="PG" ${classValue=="PG"?'selected':''}>PG</option>
                        <option value="LKG" ${classValue=="LKG"?'selected':''}>LKG</option>
                        <option value="UKG" ${classValue=="UKG"?'selected':''}>UKG</option>
                        ${[1,2,3,4,5,6,7,8].map(n => `<option value="${n}" ${classValue==n?'selected':''}>Class ${n}</option>`).join('')}
                    </select>
                </div>
                <div><label>Mobile Number</label><input id="s_mobile" value="${prefillData?.mobile || ''}"></div>
            </div>

            <div id="extraFields">${extraFieldsHtml}</div>
            <button onclick="addExtraField()" style="width:100%; background:var(--glass); margin-bottom:15px; font-size:12px">+ Add custom data field</button>
            
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; background:#475569">Cancel</button>
                <button id="saveBtn" onclick="saveStudent('${reqDocId}')" style="flex:2">Admit Student</button>
            </div>`;
    }

    function addExtraField() {
        const div = document.createElement('div');
        div.className = 'dynamic-row';
        div.innerHTML = `<input placeholder="Label" class="ext-key"><input placeholder="Value" class="ext-val"><button onclick="this.parentElement.remove()" style="background:none; color:var(--accent)">×</button>`;
        document.getElementById('extraFields').appendChild(div);
    }

    async function saveStudent(reqDocId = "null") {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving Data...";
        btn.disabled = true;

        const data = {
            id: document.getElementById('s_id').value,
            name: document.getElementById('s_name').value,
            father: document.getElementById('s_father').value,
            class: document.getElementById('s_class').value,
            mobile: document.getElementById('s_mobile').value,
            admissionDate: document.getElementById('s_date').value,
            timestamp: new Date().getTime() // For analytics
        };

        document.querySelectorAll('.ext-key').forEach((k, i) => { 
            const v = document.querySelectorAll('.ext-val')[i].value;
            if(k.value) data[k.value] = v;
        });

        try {
            await db.collection("students").doc(data.id).set(data);
            if(reqDocId !== "null") await db.collection("new_requests").doc(reqDocId).delete();
            alert("Registration Complete!");
            updateCapacityAndGraph();
            closeModal();
        } catch(e) { alert("Firebase Error: " + e.message); }
    }

    // --- PIPELINE STREAM ---
    db.collection("new_requests").onSnapshot(snap => {
        let html = "";
        document.getElementById("countLabel").innerText = snap.size + " NEW";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div class="req-card">
                <div><b style="color:var(--accent)">${d.name}</b><br><small>${d.class} | ${d.mobile}</small></div>
                <div class="pipeline-actions">
                    <button class="btn-small btn-pdf" onclick="generatePdfFromId('${doc.id}', 'new_requests', 'REGISTRATION SLIP')">📄 PDF</button>
                    <button class="btn-small" onclick='approveAdmission("${doc.id}")'>Approve</button>
                    <button class="btn-small btn-reject" onclick='rejectAdmission("${doc.id}")'>×</button>
                </div>
            </div>`;
        });
        document.getElementById("requestList").innerHTML = html || "<p style='opacity:0.5; text-align:center;'>No pending requests.</p>";
    });

    async function approveAdmission(id) {
        const doc = await db.collection("new_requests").doc(id).get();
        if(doc.exists) openStudentModal(doc.data(), id);
    }

    async function rejectAdmission(id) {
        if(confirm("Confirm rejection of this request? Data will be deleted.")) {
            await db.collection("new_requests").doc(id).delete();
        }
    }

    // --- SEARCH LOGIC ---
    let currentMode = 'details';
    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('detailsTab').classList.toggle('active', mode==='details');
        document.getElementById('resultsTab').classList.toggle('active', mode==='results');
    }

    async function mainSearch() {
        const id = document.getElementById("finderInput").value;
        const resDiv = document.getElementById("finderResult");
        resDiv.innerHTML = "Querying Database...";
        
        if(currentMode === 'details') {
            const doc = await db.collection("students").doc(id).get();
            if(doc.exists) {
                const d = doc.data();
                resDiv.innerHTML = `<div class="card" style="border:1px solid var(--success); background:rgba(16,185,129,0.05)">
                    <h4 style="margin:0">${d.name}</h4>
                    <p style="font-size:12px; opacity:0.7">ID: ${id} | Class: ${d.class}</p>
                    <button class="btn-small btn-pdf" onclick="generatePdfFromId('${id}', 'students', 'PROFILE RECORD')">Download PDF Profile</button>
                </div>`;
            } else resDiv.innerHTML = "Enrollment ID not found.";
        } else {
            const doc = await db.collection("results").doc(id).get();
            if(doc.exists) {
                let html = "<h4>Records Found:</h4>";
                Object.keys(doc.data().exams).forEach(ex => { 
                    html += `<button onclick="downloadResult('${id}','${ex}')" style="width:100%; margin-bottom:8px; background:var(--glass)">${ex}</button>`; 
                });
                resDiv.innerHTML = html;
            } else resDiv.innerHTML = "No exam results found for this ID.";
        }
    }

    // --- EXACT PDF GENERATION SYSTEM (WITH PHOTO & AADHAR SUPPORT) ---
    async function generatePdfFromId(docId, collection, title) {
        const doc = await db.collection(collection).doc(docId).get();
        if(doc.exists) generatePDF(doc.data(), title);
    }

    function generatePDF(data, title) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // 1. School Header & Logo
        try {
            doc.addImage('logo.png', 'PNG', 15, 8, 20, 20); 
        } catch (e) { console.log("Header logo missing."); }

        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("JANTRAJI DEVI VIDYA MANDIR LAMBHUA", 40, 18);
        doc.setFontSize(10);
        doc.text(title, 105, 25, {align: "center"});
        doc.line(15, 30, 195, 30);

        let studentPhotoUrl = null;
        let aadharImageUrl = null;
        const tableBody = [];

        // 2. Sorting Logic (Matches your image detection requirement)
        Object.entries(data).forEach(([key, value]) => {
            const k = key.toLowerCase();
            const v = String(value);

            if ((k.includes('photo') || k.includes('image')) && (v.startsWith('http') || v.startsWith('data:image'))) {
                studentPhotoUrl = v;
            } else if (k.includes('aadhar') && (v.startsWith('http') || v.startsWith('data:image'))) {
                aadharImageUrl = v;
            } else if (typeof value !== 'object') {
                tableBody.push([key.toUpperCase(), value]);
            }
        });

        // 3. Render Table
        doc.autoTable({ 
            startY: 35, 
            body: tableBody, 
            theme: 'grid',
            styles: { fontSize: 9 },
            margin: { right: studentPhotoUrl ? 60 : 15 } 
        });

        let finalY = doc.lastAutoTable.finalY;

        // 4. Student Photo (Top Right Box)
        if (studentPhotoUrl) {
            try {
                doc.addImage(studentPhotoUrl, 'JPEG', 155, 35, 40, 45);
                doc.setDrawColor(0);
                doc.rect(155, 35, 40, 45); // Frame
            } catch (e) { doc.text("Invalid Photo Data", 165, 55); }
        }

        // 5. Aadhar Document (Bottom Support)
        if (aadharImageUrl) {
            if (finalY + 60 > 280) { doc.addPage(); finalY = 20; }
            try {
                doc.setFont("helvetica", "bold");
                doc.text("AADHAR CARD DOCUMENT ATTACHED:", 15, finalY + 15);
                doc.addImage(aadharImageUrl, 'JPEG', 15, finalY + 20, 80, 50);
                doc.setDrawColor(150);
                doc.rect(15, finalY + 20, 80, 50); // Frame
            } catch (e) { console.error("Aadhar image corrupted."); }
        }

        doc.save(`${data.name || 'document'}_record.pdf`);
    }

    // --- EXAM RESULTS & ADMIN MANAGER ---
    async function downloadResult(sid, exId) {
        const sSnap = await db.collection("students").doc(sid).get();
        const rSnap = await db.collection("results").doc(sid).get();
        const s = sSnap.data();
        const r = rSnap.data().exams[exId];
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text(`EXAM REPORT: ${exId}`, 105, 20, {align: "center"});
        doc.setFontSize(10);
        doc.text(`Student: ${s.name} | ID: ${sid}`, 20, 30);
        doc.autoTable({ startY: 40, head: [['Subject', 'Marks Obtained']], body: Object.entries(r.subjects) });
        doc.save(`${s.name}_${exId}.pdf`);
    }

    function openResultModal() {
        toggleFab();
        document.getElementById('modalBody').innerHTML = `
            <h3>Upload Exam Marks</h3>
            <input id="r_id" placeholder="Student ID (e.g. 0001)">
            <input id="r_exam" placeholder="Exam Name (e.g. Half Yearly)">
            <div id="subjectList"><div style="display:flex; gap:5px"><input placeholder="Subject" class="sub-name"><input placeholder="Marks" class="sub-marks" style="width:80px"></div></div>
            <button onclick="addSubjectRow()" style="background:#334155; width:100%; margin:10px 0">+ Add Subject Row</button>
            <button onclick="saveResult()" style="width:100%">Publish Result</button>`;
        document.getElementById('systemModal').classList.add('active');
    }

    function addSubjectRow() {
        const div = document.createElement('div'); div.style.display = 'flex'; div.style.gap = '5px';
        div.innerHTML = `<input placeholder="Subject" class="sub-name"><input placeholder="Marks" class="sub-marks" style="width:80px">`;
        document.getElementById('subjectList').appendChild(div);
    }

    async function saveResult() {
        const sid = document.getElementById('r_id').value;
        const examName = document.getElementById('r_exam').value;
        const subjects = {};
        document.querySelectorAll('.sub-name').forEach((n, i) => { 
            const m = document.querySelectorAll('.sub-marks')[i].value;
            if(n.value) subjects[n.value] = m;
        });

        const docRef = db.collection("results").doc(sid);
        const doc = await docRef.get();
        let data = doc.exists ? doc.data() : { exams: {} };
        data.exams[examName] = { subjects, date: new Date().toLocaleDateString() };
        await docRef.set(data);
        alert("Marks Synchronized."); closeModal();
    }

    async function openAdminManager() {
        toggleFab();
        document.getElementById('modalBody').innerHTML = `
            <h3>Admin Access Manager</h3>
            <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; margin-bottom:20px;">
                <input id="newAdminName" placeholder="Full Name">
                <input id="newAdminId" placeholder="Access ID">
                <input id="newAdminPass" type="password" placeholder="Key Phrase">
                <button onclick="addNewAdmin()" style="width:100%">Grant Access</button>
            </div>
            <div id="adminListContainer">Fetching staff...</div>`;
        document.getElementById('systemModal').classList.add('active');
        loadAdminList();
    }

    async function loadAdminList() {
        const snap = await db.collection("admins").get();
        let html = "<h4>Current Access Keys</h4>";
        snap.forEach(doc => {
            html += `<div class="admin-list-item">
                <span><b>${doc.data().name}</b> (${doc.id})</span>
                <button onclick="deleteAdmin('${doc.id}')" style="background:#ef4444; font-size:10px">Revoke</button>
            </div>`;
        });
        document.getElementById("adminListContainer").innerHTML = html;
    }

    async function addNewAdmin() {
        const id = document.getElementById("newAdminId").value;
        const name = document.getElementById("newAdminName").value;
        const pass = document.getElementById("newAdminPass").value;
        if(!id || !name || !pass) return alert("All fields required.");
        await db.collection("admins").doc(id).set({ name, password: pass });
        loadAdminList();
    }

    async function deleteAdmin(id) {
        if(confirm("Revoke admin access?")) { await db.collection("admins").doc(id).delete(); loadAdminList(); }
    }

    // --- SYSTEM UTILITIES ---
    function logout() { localStorage.clear(); window.location.href="index.html"; }
    function Open_Nova() { window.location.href="https://ptsomesh2009-ai.github.io/Bill-nova-server-1/";}

    // --- INITIALIZATION ---
    updateCapacityAndGraph();
</script>
